<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MRK Institute of Technology</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

    /* Make footer stay at bottom always */  
    html, body {
        height: 100%;
        margin: 0;
    }

    body {
        display: flex;
        flex-direction: column;
        background: #f0eeee;
        font-family: Arial, sans-serif;
        color: #000;
    }

    /* TOP BAR */
    .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: #3b003b; /* Purple */
        flex-wrap: wrap;
    }

    .left-section {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo {
        width: 45px;
        height: 45px;
        border-radius: 50%;
    }

    .title {
        font-size: 22px;
        font-weight: 600;
        color: white;
        text-align: left;
    }

    /* SEARCH BAR */
    .search-area {
        display: flex;
        align-items: center;
        margin-top: 8px;
    }

    .search-input {
        background: white;
        border: none;
        outline: none;
        padding: 10px 15px;
        width: 180px;
        border-radius: 25px 0 0 25px;
        font-size: 14px;
        color: black;
    }

    .search-icon-box {
        background: #690674; /* Dark purple */
        width: 45px;
        height: 45px;
        border-radius: 0 25px 25px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: -10px;
        cursor: pointer;
    }

    .search-icon-box i {
        color: white;
        font-size: 18px;
    }

    /* Back button */
    .back-btn {
        padding: 8px 16px;
        border: 2px solid white;
        background: transparent;
        color: white;
        border-radius: 25px;
        font-size: 14px;
        cursor: pointer;
        margin-left: 10px;
    }

    .staff-plan {
        margin-top: 40px;
        text-align: center;
        font-size: 26px;
        font-weight: bold;
        width: 100%;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 600px) {
        .top-bar {
            flex-direction: column;
            text-align: center;
        }

        .left-section {
            justify-content: center;
        }

        .right-section {
            margin-top: 10px;
            width: 100%;
            justify-content: center;
        }

        .search-area {
            justify-content: center;
        }
    }

    /* FOOTER STICK TO BOTTOM */
    .footer {
        background: #3b003b;
        color: white;
        text-align: center;
        padding: 15px 10px;
        font-size: 14px;
        margin-top: auto; /* PUSH FOOTER TO BOTTOM */
    }

</style>
</head>

<body>

<header class="top-bar">

    <!-- LEFT SIDE -->
    <div class="left-section">
        <img src="./image/book.jpg" alt="MRK Logo" class="logo">
        <div class="title">MRK Institute of Technology</div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-section d-flex align-items-center">

        <div class="search-area">
            <input type="text" class="search-input" placeholder="Search...">
            <div class="search-icon-box">
                <i class="fa fa-search"></i>
            </div>
        </div>

        <button class="back-btn" onclick="goBack()">← Back</button>

    </div>
</header>

<div class="staff-plan">Staff Plan</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2025 MRK Institute of Technology • All Rights Reserved</p>
</footer>

<script>
    function goBack() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
